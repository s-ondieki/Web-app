<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safari | Welcome back</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #a86539;
            --accent-soft: #d48d59;
            --surface: rgba(255, 252, 246, 0.78);
            --text-main: #2f241c;
            --text-light: #6f6258;
            --border: rgba(255, 255, 255, 0.36);
            --error: #ba3a3a;
            --success: #247e46;
        }

        body {
            font-family: "Avenir Next", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                linear-gradient(rgba(30, 19, 13, 0.56), rgba(30, 19, 13, 0.68)),
                url('assets/images/safari-background.avif') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 247, 235, 0.13);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: #f7e5cc;
            text-decoration: none;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            color: white;
            border: none;
            padding: 0.68rem 1.5rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.25s;
            font-weight: 700;
            box-shadow: 0 10px 24px rgba(168, 101, 57, 0.22);
        }

        .btn:hover {
            filter: brightness(1.04);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.6rem 1rem;
        }

        .login-container {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 18px 20px 14px 24px;
            padding: 2.5rem 2.2rem 2.2rem;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 18px 44px rgba(18, 11, 8, 0.26);
            animation: entrance 0.45s ease;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2.05rem;
            margin-bottom: 0.7rem;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.55;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--text-main);
            font-weight: 650;
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 0.82rem 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 0.99rem;
            background: rgba(255, 255, 255, 0.56);
            color: var(--text-main);
            transition: all 0.22s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 0 0 3px rgba(168, 101, 57, 0.14);
        }

        input::placeholder {
            color: rgba(44, 44, 44, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.8rem;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.3rem;
            color: var(--text-light);
            font-size: 0.92rem;
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            background: rgba(220, 53, 69, 0.15);
            color: var(--error);
            border: 1px solid rgba(220, 53, 69, 0.3);
            display: none;
            font-size: 0.95rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            background: rgba(40, 167, 69, 0.15);
            color: var(--success);
            border: 1px solid rgba(40, 167, 69, 0.3);
            display: none;
            font-size: 0.95rem;
        }

        .success-message.show {
            display: block;
        }

        footer {
            background: rgba(255, 250, 241, 0.08);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: #efddc4;
            font-size: 0.9rem;
        }

        @keyframes entrance {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 1.9rem 1.35rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.6rem;
            }

            header {
                flex-direction: column;
                gap: 1rem;
            }

            nav {
                width: 100%;
                justify-content: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="home.html" class="logo">
            <div class="logo-mark">🦁</div>
            <span>Safari</span>
        </a>
        <nav>
            <a href="register.html">New here?</a>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <div class="login-header">
                <h1>Welcome back</h1>
                <p>Your saved plans are waiting. Sign in and pick up right where you stopped.</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="name@example.com"
                        autocomplete="email"
                        required
                    >
                </div>
            
                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Your password"
                        autocomplete="current-password"
                        required
                    >
                </div>
            
                <button type="submit" id="loginBtn" class="btn btn-login">Log in</button>
            </form>

            <div class="signup-link">
                First safari with us? <a href="register.html">Create your account</a>
            </div>
        </div>
    </main>

        <script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');
    
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
    
            // Ensure elements exist (avoid null errors)
            if (!errorDiv || !successDiv || !loginBtn) {
                console.error('Required elements not found');
                return;
            }
    
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            errorDiv.textContent = '';
            successDiv.textContent = '';
    
            const email = form.email.value.trim();
            const password = form.password.value;

            if (!email || !password) {
                errorDiv.textContent = 'Please fill out all fields.';
                errorDiv.classList.add('show');
                return;
            }
    
            const originalText = loginBtn.textContent;
            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
    
            try {
                const res = await fetch('http://localhost:4000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
    
                const data = await res.json();
    
                if (!res.ok) {
                    errorDiv.textContent = data.message || 'Login failed. Please try again.';
                    errorDiv.classList.add('show');
                } else {
                    successDiv.textContent = data.message || 'Login successful.';
                    successDiv.classList.add('show');
    
                    if (data.token) {
                        localStorage.setItem('authToken', data.token);
                    }
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1200);
                }
            } catch (err) {
                console.error('Network error:', err);
                errorDiv.textContent = 'Network error: ' + err.message;
                errorDiv.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = originalText;
            }
        });
    });
    </script>
    <div id="footer"></div>
    <script src="components/footer.js"></script>
</body>
</html>
