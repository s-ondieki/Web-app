<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Travel Safari</title>
  <meta name="description" content="Log in to your Travel Safari account to continue planning.">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background:
        linear-gradient(rgba(20,13,9,0.54), rgba(20,13,9,0.6)),
        url('assets/images/safari-background.avif') center / cover no-repeat fixed;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      flex-direction: column;
      gap: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      animation: fadeUp 0.5s ease;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-brand .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .login-brand .logo-mark img {
      width: 90px;
      height: auto;
      border-radius: 12px;
    }
    .login-brand h1 {
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-brand p {
      font-size: 0.875rem;
      color: var(--text-soft);
    }

    .form-control { padding: 11px 14px; }

    .show-toggle {
      position: relative;
    }
    .show-toggle .form-control { padding-right: 44px; }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-lighter);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 2px 4px;
    }
    .toggle-pw:hover { color: var(--text-soft); }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-soft);
    }
    .login-footer a { font-weight: 600; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-lighter);
      font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .back-home {
      font-size: 0.8rem;
      color: rgba(255,235,200,0.6);
      text-align: center;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-home:hover { color: rgba(255,235,200,0.9); text-decoration: none; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-brand">
      <div class="logo-mark"><img src="assets/images/logo.png" alt="Travel Safari Logo"></div>
      <h1>Welcome back.</h1>
      <p>Good to have you here again.</p>
    </div>

    <div id="errorMsg"  class="alert alert-error"></div>
    <div id="successMsg" class="alert alert-success"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="show-toggle">
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Your password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" id="togglePw">Show</button>
        </div>
      </div>

      <button type="submit" id="loginBtn" class="btn btn-primary btn-lg btn-full" style="margin-top:6px">
        Log in
      </button>
    </form>

    <div class="divider">or</div>

    <div class="login-footer">
      Don't have an account? <a href="register.html">Sign up — it's free</a>
    </div>
  </div>

  <a href="index.html" class="back-home">← Back to home</a>

  <script>
    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const isText = pw.type === 'text';
      pw.type = isText ? 'password' : 'text';
      this.textContent = isText ? 'Show' : 'Hide';
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorDiv   = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      const btn        = document.getElementById('loginBtn');

      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorDiv.textContent = 'Please fill in both fields.';
        errorDiv.classList.add('show');
        return;
      }

      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      try {
        const res  = await fetch('http://localhost:4000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.message || 'Login failed. Try again.';
          errorDiv.classList.add('show');
        } else {
          successDiv.textContent = 'Logged in! Taking you to your dashboard…';
          successDiv.classList.add('show');
          if (data.token) localStorage.setItem('authToken', data.token);
          if (data.user)  localStorage.setItem('user', JSON.stringify(data.user));
          setTimeout(() => { window.location.href = 'home.html'; }, 1000);
        }
      } catch (err) {
        errorDiv.textContent = 'Can\'t reach the server. Is the backend running?';
        errorDiv.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    });
  </script>
</body>
</html>
