<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — Travel Safari</title>
  <meta name="description" content="Sign up to start planning your African safari trip.">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background:
        linear-gradient(rgba(20,13,9,0.54), rgba(20,13,9,0.6)),
        url('assets/images/safari-background.avif') center / cover no-repeat fixed;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      flex-direction: column;
      gap: 20px;
    }

    .register-box {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
      animation: fadeUp 0.5s ease;
    }

    .reg-brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .reg-brand .logo-mark {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #c07030, #8a4819);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      margin-bottom: 12px;
    }
    .reg-brand h1 { font-size: 1.5rem; color: var(--text); margin-bottom: 6px; }
    .reg-brand p  { font-size: 0.875rem; color: var(--text-soft); }

    .form-control { padding: 11px 14px; }

    .pw-hint {
      font-size: 0.78rem;
      color: var(--text-lighter);
      margin-top: 4px;
    }

    .pw-strength {
      height: 3px;
      border-radius: 4px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }
    .pw-strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .reg-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-soft);
    }
    .reg-footer a { font-weight: 600; }

    .back-home {
      font-size: 0.8rem;
      color: rgba(255,235,200,0.6);
      text-align: center;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-home:hover { color: rgba(255,235,200,0.9); text-decoration: none; }
  </style>
</head>
<body>

  <div class="register-box">
    <div class="reg-brand">
      <div class="logo-mark">🦁</div>
      <h1>Create your account.</h1>
      <p>Takes about 30 seconds. No credit card needed.</p>
    </div>

    <div id="errorMsg"   class="alert alert-error"></div>
    <div id="successMsg" class="alert alert-success"></div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" class="form-control"
               placeholder="Jane Doe" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="jane@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="At least 6 characters" autocomplete="new-password" required>
        <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
        <p class="pw-hint" id="pwHint">Use at least 6 characters</p>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
               placeholder="Same password again" autocomplete="new-password" required>
      </div>

      <button type="submit" id="registerBtn" class="btn btn-primary btn-lg btn-full" style="margin-top:6px">
        Create account
      </button>
    </form>

    <div class="reg-footer">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>

  <a href="index.html" class="back-home">← Back to home</a>

  <script>
    // Password strength indicator
    document.getElementById('password').addEventListener('input', function() {
      const val = this.value;
      const bar  = document.getElementById('pwBar');
      const hint = document.getElementById('pwHint');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { w: '0%',   bg: 'transparent', txt: 'Use at least 6 characters' },
        { w: '25%',  bg: '#ef4444',     txt: 'Too short' },
        { w: '50%',  bg: '#f97316',     txt: 'Could be stronger' },
        { w: '75%',  bg: '#eab308',     txt: 'Getting there…' },
        { w: '100%', bg: '#22c55e',     txt: 'Strong password 👍' },
      ];
      const l = val.length === 0 ? 0 : Math.min(score, 4);
      bar.style.width      = levels[l].w;
      bar.style.background = levels[l].bg;
      hint.textContent     = levels[l].txt;
    });

    // Register form
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errorDiv   = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      const btn        = document.getElementById('registerBtn');

      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');

      const fullName       = document.getElementById('name').value.trim();
      const email          = document.getElementById('email').value.trim();
      const password       = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!fullName || !email || !password || !confirmPassword) {
        errorDiv.textContent = 'Please fill in all fields.';
        errorDiv.classList.add('show');
        return;
      }
      if (password.length < 6) {
        errorDiv.textContent = 'Password needs to be at least 6 characters.';
        errorDiv.classList.add('show');
        return;
      }
      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords don\'t match — double-check and try again.';
        errorDiv.classList.add('show');
        return;
      }

      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res  = await fetch('http://localhost:4000/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errorDiv.textContent = data.message || 'Something went wrong. Try again.';
          errorDiv.classList.add('show');
        } else {
          successDiv.textContent = 'Account created! Redirecting you to login…';
          successDiv.classList.add('show');
          setTimeout(() => { window.location.href = 'login.html'; }, 1400);
        }
      } catch (err) {
        errorDiv.textContent = 'Can\'t reach the server. Is the backend running?';
        errorDiv.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = orig;
      }
    });
  </script>
</body>
</html>
