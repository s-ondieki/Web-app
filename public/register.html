<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - 🦁Safari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #a86539;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-hover: rgba(255, 255, 255, 0.9);
            --text-main: #2c2c2c;
            --text-light: #666;
            --border: rgba(255, 255, 255, 0.3);
            --error: #c33;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B7355 0%, #A67C52 50%, #6B4423 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            text-decoration: none;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #925430;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .register-container {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-main);
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.8);
        }

        input::placeholder {
            color: rgba(44, 44, 44, 0.5);
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .form-actions button {
            flex: 1;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: white;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            background: rgba(220, 53, 69, 0.15);
            color: var(--error);
            border: 1px solid rgba(220, 53, 69, 0.3);
            display: none;
            font-size: 0.95rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            background: rgba(40, 167, 69, 0.15);
            color: var(--success);
            border: 1px solid rgba(40, 167, 69, 0.3);
            display: none;
            font-size: 0.95rem;
        }

        .success-message.show {
            display: block;
        }

        footer {
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .password-requirements {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 0.25rem;
            line-height: 1.4;
        }

        @media (max-width: 600px) {
            .register-container {
                padding: 2rem;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }

            header {
                flex-direction: column;
                gap: 1rem;
            }

            nav {
                width: 100%;
                justify-content: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="home.html" class="logo">
            <div class="logo-mark">🦁</div>
            <span>Safari </span>
        </a>
        <nav>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <div class="register-container">
            <div class="register-header">
                <h1>Join the Journey</h1>
                <p>Create your Safari account</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="At least 6 characters"
                        required
                    >
                    <div class="password-requirements">
                        Minimum 6 characters required
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Re-enter your password"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" id="registerBtn" class="btn">Create Account</button>
                    <a href="home.html" class="btn btn-secondary" style="text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center;">Cancel</a>
                </div>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </main>

    
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('registerForm');       // your form id
        const errorDiv = document.querySelector('.error-message');
        const successDiv = document.querySelector('.success-message');
        const registerBtn = document.getElementById('registerButton');
    
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
    
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
    
            const fullName = form.fullName.value.trim();   // <input name="fullName">
            const email = form.email.value.trim();
            const password = form.password.value;
    
            if (!fullName || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields.';
                errorDiv.classList.add('show');
                return;
            }
    
            const originalText = registerBtn.textContent;
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating account...';
    
            try {
                const res = await fetch('http://localhost:4000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, password })
                });
    
                const data = await res.json();
    
                if (!res.ok) {
                    errorDiv.textContent = data.message || 'Registration failed. Please try again.';
                    errorDiv.classList.add('show');
                } else {
                    successDiv.textContent = data.message || 'Registration successful.';
                    successDiv.classList.add('show');
    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }
            } catch (err) {
                console.error('Network error:', err);
                errorDiv.textContent = 'Network error: ' + err.message;
                errorDiv.classList.add('show');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = originalText;
            }
        });
    });
    </script>
    
    <div id="footer"></div>

<script src="components/footer.js"></script>
</body>
</html>
