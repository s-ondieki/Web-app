<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Safari Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #a86539;
            --surface: rgba(255, 255, 255, 0.7);
            --surface-hover: rgba(255, 255, 255, 0.9);
            --text-main: #2c2c2c;
            --text-light: #666;
            --border: rgba(255, 255, 255, 0.3);
            --error: #c33;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B7355 0%, #A67C52 50%, #6B4423 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            text-decoration: none;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #925430;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-main);
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.8);
        }

        input::placeholder {
            color: rgba(44, 44, 44, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            background: rgba(220, 53, 69, 0.15);
            color: var(--error);
            border: 1px solid rgba(220, 53, 69, 0.3);
            display: none;
            font-size: 0.95rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            background: rgba(40, 167, 69, 0.15);
            color: var(--success);
            border: 1px solid rgba(40, 167, 69, 0.3);
            display: none;
            font-size: 0.95rem;
        }

        .success-message.show {
            display: block;
        }

        footer {
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 2rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            header {
                flex-direction: column;
                gap: 1rem;
            }

            nav {
                width: 100%;
                justify-content: center;
                gap: 1rem;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="home.html" class="logo">
            <div class="logo-mark">🦁</div>
            <span>Safari Explorer</span>
        </a>
        <nav>
            <a href="home.html">Home</a>
            <a href="destinations.html">Destinations</a>
            <a href="register.html">Sign Up</a>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <div class="login-header">
                <h1>Welcome Back</h1>
                <p>Login to your Safari Explorer account</p>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" id="loginBtn" class="btn btn-login">Login</button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Safari Explorer. All rights reserved. Adventure awaits.</p>
    </footer>

    <script>
        console.log('Login page loaded');

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('Form submitted');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const loginBtn = document.getElementById('loginBtn');

            // Clear previous messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            // Validate fields
            if (!email || !password) {
                console.log('Missing required fields');
                errorDiv.textContent = 'Email and password are required';
                errorDiv.classList.add('show');
                return;
            }

            // Disable button and show loading state
            loginBtn.disabled = true;
            const originalText = loginBtn.textContent;
            loginBtn.textContent = 'Logging in...';

            try {
                console.log('Sending login request for:', email);

                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok && data.success) {
                    console.log('Login successful, user:', data.user);
                    
                    // Store user data
                    localStorage.setItem('user', JSON.stringify(data.user));
                    localStorage.setItem('userId', data.user.id);
                    localStorage.setItem('userName', data.user.name);

                    successDiv.textContent = 'Login successful! Redirecting to home...';
                    successDiv.classList.add('show');

                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 1500);
                } else {
                    console.log('Login failed:', data.error || data.message);
                    
                    // Show specific error messages
                    if (response.status === 401) {
                        errorDiv.textContent = 'Invalid email or password. Please try again.';
                    } else if (data.error) {
                        errorDiv.textContent = data.error;
                    } else if (data.message) {
                        errorDiv.textContent = data.message;
                    } else {
                        errorDiv.textContent = 'Login failed. Please try again.';
                    }

                    errorDiv.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = originalText;
                }
            } catch (error) {
                console.error('Network error:', error);
                errorDiv.textContent = 'Network error: ' + error.message + '. Please check your connection and try again.';
                errorDiv.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
